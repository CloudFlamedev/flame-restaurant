<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flame Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">🔥</span>
      <span class="brand-name">FLAME</span>
    </div>

    <nav class="main-nav">
      <button class="nav-link active" data-view="menu">Menu</button>
      <button class="nav-link" data-view="orders">Orders</button>
    </nav>

    <div class="topbar-actions">
      <button id="cartBtn" class="icon-btn">
        🛒 <span id="cartCount" class="badge hidden">0</span>
      </button>
      <button id="profileBtn" class="icon-btn">👤</button>
    </div>
  </div>
</header>

<main>

  <!-- MENU VIEW -->
  <section id="view-menu" class="view active">
    <div class="hero">
      <div class="hero-text">
        <span class="eyebrow">🔥 Now firing in Bengaluru</span>
        <h1>Real fire.<br>Real flavor.</h1>
        <p>Bengaluru's home of chargrilled classics — ordered in seconds, delivered hot.</p>
        <div class="search-bar">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput" placeholder="Search paneer tikka, pizza, dessert...">
        </div>
      </div>
      <div class="hero-visual" aria-hidden="true">
        <div class="hero-glow"></div>
        <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=700&q=80" alt="">
      </div>
    </div>

    <div id="categoryStrip" class="category-strip"></div>

    <div id="foodGrid" class="food-grid"></div>
  </section>

  <!-- ORDERS VIEW -->
  <section id="view-orders" class="view">
    <h2 class="section-title">Your Orders</h2>
    <div id="ordersList" class="orders-list"></div>
  </section>

</main>

<!-- CART DRAWER -->
<div id="cartOverlay" class="overlay hidden"></div>
<aside id="cartDrawer" class="drawer">
  <div class="drawer-header">
    <h3>Your Cart</h3>
    <button id="closeCart" class="icon-btn">✕</button>
  </div>
  <div id="cartItems" class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cartTotal">₹0</span>
    </div>
    <div class="payment-methods">
      <label><input type="radio" name="paymethod" value="card" checked> Card</label>
      <label><input type="radio" name="paymethod" value="upi"> UPI</label>
      <label><input type="radio" name="paymethod" value="cod"> Cash on Delivery</label>
    </div>
    <button id="checkoutBtn" class="btn-primary full-width">Checkout</button>
  </div>
</aside>

<!-- AUTH / PROFILE MODAL -->
<div id="authOverlay" class="overlay hidden"></div>
<div id="authModal" class="modal hidden">
  <button id="closeAuth" class="icon-btn modal-close">✕</button>

  <div id="authLoggedOut">
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Log In</button>
      <button class="tab-btn" data-tab="register">Sign Up</button>
    </div>

    <form id="loginForm" class="auth-form">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="btn-primary full-width">Log In</button>
      <p class="form-error" id="loginError"></p>
    </form>

    <form id="registerForm" class="auth-form hidden">
      <input type="text" id="regName" placeholder="Full name" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="tel" id="regPhone" placeholder="Phone (optional)">
      <input type="password" id="regPassword" placeholder="Password" required>
      <button type="submit" class="btn-primary full-width">Create Account</button>
      <p class="form-error" id="registerError"></p>
    </form>
  </div>

  <div id="authLoggedIn" class="hidden">
    <h3>My Profile</h3>
    <form id="profileForm" class="auth-form">
      <label class="field-label">Name</label>
      <input type="text" id="profileName">
      <label class="field-label">Email</label>
      <input type="email" id="profileEmail" disabled>
      <label class="field-label">Phone</label>
      <input type="tel" id="profilePhone">
      <label class="field-label">Delivery address</label>
      <input type="text" id="profileAddress">
      <button type="submit" class="btn-primary full-width">Save Changes</button>
      <p class="form-success" id="profileSuccess"></p>
    </form>
    <button id="logoutBtn" class="btn-secondary full-width">Log Out</button>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/app.js"></script>
</body>
</html>
